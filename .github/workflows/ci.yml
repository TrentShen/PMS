name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  frontend-build:
    name: Frontend Type Check & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pms/web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pms/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  backend-lint:
    name: Backend Lint & Contract Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pms/backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pms/backend/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check src

      - name: Contract check
        run: python3 scripts/check_contract.py

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pms/backend
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root_password
          MYSQL_DATABASE: pms
          MYSQL_USER: pms
          MYSQL_PASSWORD: pms_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pms/backend/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            mysqladmin ping -h127.0.0.1 -uroot -proot_password && break
            sleep 1
          done

      - name: Run migrations
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3306
          MYSQL_USER: pms
          MYSQL_PASSWORD: pms_password
          MYSQL_DATABASE: pms
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
        run: alembic upgrade head

      - name: Run tests
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3306
          MYSQL_USER: pms
          MYSQL_PASSWORD: pms_password
          MYSQL_DATABASE: pms
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
        run: pytest -v
