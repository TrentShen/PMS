# 生产（公司服务器）部署：应用 + MySQL + Redis + Nginx 一起上
# 上线前务必：1) 替换 .env.prod 里的 secret 与企微配置  2) 准备 HTTPS 证书挂载到 nginx
services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: pms-backend:0.9.0
    container_name: pms-backend
    restart: unless-stopped
    env_file:
      - ./.env.prod
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"

  mysql:
    image: mysql:8.0
    container_name: pms-mysql
    restart: unless-stopped
    env_file:
      - ./.env.prod
    volumes:
      - pms_mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pms-redis
    restart: unless-stopped
    volumes:
      - pms_redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:1.27-alpine
    container_name: pms-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - ./web-dist:/usr/share/nginx/html:ro
    depends_on:
      - backend

volumes:
  pms_mysql_data:
  pms_redis_data:
