# 生产部署：全部容器化，一键 docker compose up -d --build
# 前置：1) 创建 .env.prod  2) HTTPS 证书放 ./certs/
services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: pms-backend:latest
    container_name: pms-backend
    restart: unless-stopped
    env_file:
      - ./.env.prod
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"

  frontend:
    build:
      context: ../web
      dockerfile: Dockerfile
    image: pms-frontend:latest
    container_name: pms-frontend
    volumes:
      - web_dist:/output
    command: ["sh", "-c", "cp -r /dist/* /output/"]
    restart: "no"

  mysql:
    image: mysql:8.0
    container_name: pms-mysql
    restart: unless-stopped
    env_file:
      - ./.env.prod
    ports:
      - "3307:3306"
    volumes:
      - pms_mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pms-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - pms_redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:1.27-alpine
    container_name: pms-nginx
    restart: unless-stopped
    ports:
      # 30088 由宿主机系统 nginx 统一监听并提供 SSL，容器仅监听 80
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - web_dist:/usr/share/nginx/html:ro
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_completed_successfully

volumes:
  pms_mysql_data:
  pms_redis_data:
  web_dist:
