server {
    listen 80;
    server_name shanghai.idc.matrixorigin.cn;

    # 公网入口 nginx 将 30088 反向代理到本机 80，
    # 因此 80 端口需要直接提供服务，不能再 301 回 30088，
    # 否则会与公网入口形成 301 死循环。
    client_max_body_size 20M;

    # 确保中文不乱码
    charset utf-8;
    charset_types text/xml text/plain text/css application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;

        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|json)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Vary "Accept-Encoding";
        }
    }

    resolver 127.0.0.11 valid=10s;

    location /api/ {
        set $upstream_backend backend:8000;
        proxy_pass         http://$upstream_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
    }

    location /health {
        set $upstream_health backend:8000;
        proxy_pass         http://$upstream_health/api/v1/health;
        proxy_http_version 1.1;
    }
}

