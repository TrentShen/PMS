server {
    listen 80;
    server_name shanghai.idc.matrixorigin.cn;

    # HTTP 统一重定向到 HTTPS（生产外部访问均走 30088）
    return 301 https://$server_name:30088$request_uri;
}

server {
    listen 30088 ssl;
    server_name shanghai.idc.matrixorigin.cn;

    ssl_certificate     /etc/nginx/certs/pms.crt;
    ssl_certificate_key /etc/nginx/certs/pms.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 20M;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;

        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|json)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Vary "Accept-Encoding";
        }
    }

    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
    }

    location /health {
        proxy_pass         http://backend:8000/api/v1/health;
        proxy_http_version 1.1;
    }
}
